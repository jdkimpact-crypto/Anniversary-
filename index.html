<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Wedding Anniversary ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #000000, #3a0a4a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  text-align: center;
  padding: 20px;
  width: 90%;
  max-width: 360px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(255,0,150,0.3);
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
  margin: 10px 0;
}

h2 {
  font-size: 18px;
  font-weight: 300;
}

.photo img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  margin: 15px 0;
}
</style>
</head>

<body>

<div class="card">
  <h2>Happy 13th Anniversary</h2>

  <div class="photo">
    <img src="photo.jpg" alt="Couple Photo">
  </div>

  <h1>Javid ❤️ Farveena</h1>

  <p>13 Years of Love, Trust & Togetherness</p>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
