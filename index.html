<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javid ❤ Farveena · 13th Anniversary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&family=Lato:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:     #d4a843;
  --gold-lt:  #f5d07a;
  --rose:     #c94070;
  --rose-lt:  #f06090;
  --ink:      #06040e;
  --glass:    rgba(255,255,255,0.05);
  --border:   rgba(255,255,255,0.09);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Lato', sans-serif;
  background: var(--ink);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* INTRO */
#intro {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#000;
  transition:opacity 1.4s cubic-bezier(.4,0,.2,1), visibility 1.4s;
}
#intro.gone { opacity:0; visibility:hidden; pointer-events:none; }

.intro-ornament {
  width:160px; height:160px;
  display:flex; align-items:center; justify-content:center;
  position:relative; margin-bottom:32px;
}
.intro-ornament svg { position:absolute; inset:0; animation:spin-slow 12s linear infinite; }
.intro-ornament .center-icon { font-size:52px; animation:pulse-heart 2s ease-in-out infinite; position:relative; z-index:1; }

.intro-year {
  font-family:'Cinzel',serif; font-size:11px;
  letter-spacing:8px; text-transform:uppercase; color:var(--gold);
  opacity:0; animation:riseIn 1.2s ease forwards 0.4s;
}
.intro-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,8vw,46px); font-style:italic;
  text-align:center; margin:12px 20px 0;
  opacity:0; animation:riseIn 1.2s ease forwards 0.8s;
  background:linear-gradient(135deg,#fff 30%,var(--gold-lt));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.intro-line {
  width:60px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:20px auto;
  opacity:0; animation:riseIn 1s ease forwards 1.2s;
}
#enterBtn {
  font-family:'Cinzel',serif; font-size:11px;
  letter-spacing:5px; text-transform:uppercase; color:var(--gold);
  border:1px solid rgba(212,168,67,0.4); background:transparent;
  padding:13px 36px; border-radius:40px; cursor:pointer;
  opacity:0; animation:riseIn 1s ease forwards 1.6s;
  transition:background 0.35s,color 0.35s,box-shadow 0.35s,border-color 0.35s;
}
#enterBtn:hover { background:var(--gold); color:#000; border-color:var(--gold); box-shadow:0 0 40px rgba(212,168,67,0.45); }

/* MAIN */
#main { display:none; position:relative; z-index:1; min-height:100vh; padding:0 0 80px; }

.hero { text-align:center; padding:64px 20px 40px; position:relative; }
.hero-label {
  display:inline-flex; align-items:center; gap:10px;
  font-family:'Cinzel',serif; font-size:9px;
  letter-spacing:6px; text-transform:uppercase; color:var(--gold);
  margin-bottom:22px; opacity:0; animation:riseIn 1s ease forwards 0.1s;
}
.hero-label::before,.hero-label::after { content:''; width:28px; height:1px; background:var(--gold); opacity:0.5; }
.hero-names {
  font-family:'Playfair Display',serif;
  font-size:clamp(38px,10vw,68px); font-weight:700; line-height:1.05;
  opacity:0; animation:riseIn 1s ease forwards 0.25s;
}
.hero-names .amp { display:inline-block; font-style:italic; font-weight:400; color:var(--rose-lt); margin:0 10px; font-size:0.85em; }
.hero-sub {
  margin-top:14px; font-size:13px; font-weight:200;
  letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.4);
  opacity:0; animation:riseIn 1s ease forwards 0.4s;
}

/* PHOTO FRAME */
.frame-wrap { position:relative; width:calc(100% - 40px); max-width:340px; margin:36px auto 0; opacity:0; animation:riseIn 1s ease forwards 0.55s; }
.frame-border {
  position:relative; border-radius:26px; padding:3px;
  background:linear-gradient(135deg,var(--gold) 0%,rgba(212,168,67,0.1) 40%,var(--rose) 100%);
  box-shadow:0 20px 70px rgba(0,0,0,0.7),0 0 60px rgba(201,64,112,0.18);
}
.frame-inner { border-radius:24px; overflow:hidden; height:400px; position:relative; background:#111; }
.slide-img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  opacity:1; transform:scale(1.04);
  animation:kenburns 12s ease-in-out infinite alternate;
}
.tick { position:absolute; width:18px; height:18px; border-color:rgba(212,168,67,0.6); border-style:solid; z-index:3; }
.tick.tl { top:12px; left:12px; border-width:1px 0 0 1px; border-radius:4px 0 0 0; }
.tick.tr { top:12px; right:12px; border-width:1px 1px 0 0; border-radius:0 4px 0 0; }
.tick.bl { bottom:12px; left:12px; border-width:0 0 1px 1px; border-radius:0 0 0 4px; }
.tick.br { bottom:12px; right:12px; border-width:0 1px 1px 0; border-radius:0 0 4px 0; }

/* STATS */
.stats {
  display:flex; margin:28px 20px 0;
  border-radius:20px; overflow:hidden; border:1px solid var(--border);
  opacity:0; animation:riseIn 1s ease forwards 0.7s;
}
.stat { flex:1; padding:18px 6px; text-align:center; background:var(--glass); border-right:1px solid var(--border); }
.stat:last-child { border-right:none; }
.stat-n { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; line-height:1; color:var(--gold-lt); }
.stat-l { font-size:8px; font-weight:300; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:5px; }

/* QUOTE */
.quote-card {
  margin:20px 20px 0; padding:24px 22px;
  border-radius:20px; border:1px solid var(--border); background:var(--glass);
  text-align:center; opacity:0; animation:riseIn 1s ease forwards 0.85s; position:relative; overflow:hidden;
}
.quote-card::before {
  content:'"'; position:absolute; top:-10px; left:14px;
  font-family:'Playfair Display',serif; font-size:80px;
  color:var(--rose); opacity:0.12; line-height:1;
}
.quote-card p { font-family:'Playfair Display',serif; font-style:italic; font-size:15px; line-height:1.9; color:rgba(255,255,255,0.65); position:relative; z-index:1; }
.quote-card .sig { margin-top:12px; font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); font-style:normal; font-family:'Cinzel',serif; }

.date-tag { text-align:center; margin-top:24px; opacity:0; animation:riseIn 1s ease forwards 1s; }
.date-tag span { font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px; text-transform:uppercase; color:rgba(212,168,67,0.35); }

/* PARTICLES */
#ptx { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.pt { position:absolute; bottom:-30px; animation:ptFloat linear infinite; opacity:0; }

/* KEYFRAMES */
@keyframes riseIn { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:translateY(0);} }
@keyframes spin-slow { to{transform:rotate(360deg);} }
@keyframes pulse-heart { 0%,100%{transform:scale(1);} 15%{transform:scale(1.22);} 30%{transform:scale(1);} 45%{transform:scale(1.14);} 60%{transform:scale(1);} }
@keyframes ptFloat { 0%{transform:translateY(0) rotate(0deg);opacity:0.8;} 80%{opacity:0.3;} 100%{transform:translateY(-110vh) rotate(720deg);opacity:0;} }
@keyframes kenburns { 0%{transform:scale(1.04) translate(0,0);} 100%{transform:scale(1.1) translate(-2%,-1%);} }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="ptx"></div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-ornament">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="74" stroke="#d4a843" stroke-width="0.5" stroke-dasharray="4 6"/>
      <circle cx="80" cy="80" r="62" stroke="#d4a843" stroke-width="0.3" opacity="0.4"/>
      <polygon points="80,10 84,74 80,78 76,74" fill="#d4a843" opacity="0.3"/>
      <polygon points="80,150 84,86 80,82 76,86" fill="#d4a843" opacity="0.3"/>
      <polygon points="10,80 74,76 78,80 74,84" fill="#d4a843" opacity="0.3"/>
      <polygon points="150,80 86,76 82,80 86,84" fill="#d4a843" opacity="0.3"/>
    </svg>
    <span class="center-icon">💍</span>
  </div>
  <p class="intro-year">XIII · Wedding Anniversary</p>
  <h1 class="intro-title">Javid & Farveena</h1>
  <div class="intro-line"></div>
  <button id="enterBtn">Open</button>
</div>

<!-- MAIN -->
<div id="main">
  <section class="hero">
    <div class="hero-label">XIII · Anniversary</div>
    <h1 class="hero-names">Javid <span class="amp">❤</span> Farveena</h1>
    <p class="hero-sub">Together · Always · Forever</p>
  </section>

  <div class="frame-wrap">
    <div class="frame-border">
      <div class="frame-inner">
        <div class="tick tl"></div>
        <div class="tick tr"></div>
        <div class="tick bl"></div>
        <div class="tick br"></div>
        <img class="slide-img" src="photo1.jpg" alt="">
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sY">13</div><div class="stat-l">Years</div></div>
    <div class="stat"><div class="stat-n" id="sM">156</div><div class="stat-l">Months</div></div>
    <div class="stat"><div class="stat-n" id="sD">4748</div><div class="stat-l">Days</div></div>
  </div>

  <div class="quote-card">
    <p>Every year with you rewrites what love means —<br>and I can't wait to keep reading.</p>
    <p class="sig">Javid ❤ Farveena · 2025</p>
  </div>

  <div class="date-tag">
    <span>Celebrating Thirteen Beautiful Years</span>
  </div>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
/* ENTER */
document.getElementById('enterBtn').onclick = () => {
  document.getElementById('intro').classList.add('gone');
  const m = document.getElementById('main');
  m.style.display = 'block';
  document.getElementById('music').play().catch(()=>{});
  calcStats();
  startParticles();
};

/* CANVAS BG */
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; draw(); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W*.5,H*.3,0,W*.5,H*.5,W*.9);
    bg.addColorStop(0,'#1a0530'); bg.addColorStop(0.5,'#0c0120'); bg.addColorStop(1,'#06040e');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    [{x:.15,y:.8,r:.35,c:'rgba(201,64,112,0.09)'},{x:.85,y:.15,r:.3,c:'rgba(120,0,200,0.1)'},{x:.5,y:.5,r:.5,c:'rgba(212,168,67,0.04)'}].forEach(b=>{
      const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*W);
      g.addColorStop(0,b.c); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    });
    for(let i=0;i<180;i++){
      const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.1+0.2;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.1})`; ctx.fill();
    }
  }
  window.addEventListener('resize',resize); resize();
})();

/* STATS */
function calcStats(){
  const wed=new Date('2012-04-25');
  const now=new Date();
  const days=Math.floor((now-wed)/86400000);
  document.getElementById('sY').textContent=Math.floor(days/365.25);
  document.getElementById('sM').textContent=Math.floor(days/30.44);
  document.getElementById('sD').textContent=days.toLocaleString();
}

/* PARTICLES */
function startParticles(){
  const box=document.getElementById('ptx');
  const glyphs=['❤','✦','✿','·','⋆','♡'];
  const colors=['#d4a843','#f5d07a','#c94070','rgba(255,255,255,0.6)'];
  setInterval(()=>{
    const p=document.createElement('div');
    p.className='pt';
    const g=Math.random()>0.45;
    const sz=Math.random()*10+5;
    p.style.cssText=`left:${Math.random()*100}vw;font-size:${sz+2}px;color:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*8+7}s;animation-delay:${Math.random()*2}s;`;
    if(g){ p.textContent=glyphs[Math.floor(Math.random()*glyphs.length)]; }
    else { p.style.width=sz+'px'; p.style.height=sz+'px'; p.style.borderRadius='50%'; p.style.background=colors[Math.floor(Math.random()*colors.length)]; p.style.opacity='0.25'; }
    box.appendChild(p);
    setTimeout(()=>p.remove(),16000);
  },300);
}
</script>
</body>
</html>
